<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Settings — STACKLY Events</title>
  <link rel="stylesheet" href="css/style.css?v=1" />
  <style>
    body { background: var(--bg-alt); display: flex; min-height: 100vh; padding-top: 0; }
    .dashboard-sidebar { width: 280px; background: var(--bg-card-solid); border-right: 1px solid var(--border); display: flex; flex-direction: column; position: fixed; top: 0; bottom: 0; left: 0; z-index: 100; transition: transform 0.3s var(--ease); }
    .sidebar-header { padding: 1.5rem; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
    .sidebar-logo img { height: 32px; width: auto; filter: brightness(0) invert(1); }
    .sidebar-close { display: none; background: none; border: none; color: var(--text-main); cursor: pointer; }
    .sidebar-user { padding: 1.5rem; display: flex; align-items: center; gap: 1rem; border-bottom: 1px solid var(--border); }
    .sidebar-user-avatar { width: 48px; height: 48px; border-radius: 50%; background: linear-gradient(135deg, var(--primary), var(--secondary)); display: flex; align-items: center; justify-content: center; color: var(--bg-main); font-size: 1.2rem; font-weight: 700; flex-shrink: 0; }
    .sidebar-user-info { overflow: hidden; }
    .sidebar-user-name { font-weight: 700; font-size: 1rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: var(--text-main); }
    .sidebar-user-role { font-size: 0.8rem; color: var(--primary); font-weight: 600; }
    .sidebar-nav { padding: 1.5rem 1rem; flex: 1; display: flex; flex-direction: column; gap: 0.5rem; }
    .sidebar-link { display: flex; align-items: center; gap: 0.75rem; padding: 0.85rem 1rem; color: var(--text-secondary); border-radius: var(--radius-md); font-weight: 500; font-size: 0.95rem; transition: all 0.2s; text-decoration: none; }
    .sidebar-link:hover { background: rgba(255,255,255,0.04); color: var(--text-main); }
    .sidebar-link.active { background: rgba(200,247,49,0.06); color: var(--primary); }
    .sidebar-link.active svg { color: var(--primary); }
    .sidebar-link svg { color: var(--text-light); transition: all 0.2s; }
    .sidebar-footer { padding: 1rem; border-top: 1px solid var(--border); }
    .logout-btn { display: flex; align-items: center; gap: 0.75rem; width: 100%; padding: 0.85rem 1rem; color: var(--danger); background: rgba(239,68,68,0.05); border: none; border-radius: var(--radius-md); font-weight: 600; font-size: 0.95rem; cursor: pointer; transition: all 0.2s; }
    .logout-btn:hover { background: rgba(239,68,68,0.1); }
    .dashboard-main { flex: 1; margin-left: 280px; padding: 2rem; display: flex; flex-direction: column; min-height: 100vh; }
    .dashboard-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem; }
    .dashboard-title { font-family: var(--font-heading); font-size: 1.8rem; font-weight: 800; color: var(--text-main); }
    .mobile-menu-btn { display: none; background: var(--bg-card-solid); border: 1px solid var(--border); border-radius: var(--radius-md); padding: 0.5rem; cursor: pointer; color: var(--text-main); }
    
    .settings-panel { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius-2xl); padding: 2rem; max-width: 800px; }
    .settings-title { font-family: var(--font-heading); font-size: 1.4rem; font-weight: 700; color: var(--text-main); margin-bottom: 2rem; padding-bottom: 1rem; border-bottom: 1px solid var(--border); }
    
    .profile-photo-sec { display: flex; align-items: center; gap: 1.5rem; margin-bottom: 2rem; }
    .profile-photo { width: 80px; height: 80px; border-radius: 50%; background: linear-gradient(135deg, var(--primary), var(--secondary)); display: flex; align-items: center; justify-content: center; color: var(--bg-main); font-size: 2rem; font-weight: 800; }
    .profile-photo-actions { display: flex; gap: 0.75rem; }

    @media (max-width: 1023px) { .dashboard-sidebar { transform: translateX(-100%); } .dashboard-sidebar.open { transform: translateX(0); } .dashboard-main { margin-left: 0; } .mobile-menu-btn { display: block; } .sidebar-close { display: block; } }
    @media (max-width: 767px) { .dashboard-main { padding: 1.25rem; } .settings-panel { padding: 1.5rem; } .profile-photo-sec { flex-direction: column; align-items: flex-start; } }
  </style>
</head>
<body>

<aside class="dashboard-sidebar" id="sidebar">
  <div class="sidebar-header">
    <a href="index.html" class="sidebar-logo"><img src="images/logo-stackly.webp" alt="STACKLY" /></a>
    <button class="sidebar-close" id="closeSidebar"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
  </div>
  <div class="sidebar-user">
    <div class="sidebar-user-avatar" id="userAvatar">U</div>
    <div class="sidebar-user-info">
      <div class="sidebar-user-name" id="userName">User Name</div>
      <div class="sidebar-user-email" id="userEmail" style="font-size: 0.75rem; color: var(--text-secondary); overflow: hidden; text-overflow: ellipsis; white-space: nowrap;">user@example.com</div>
      <div class="sidebar-user-role" id="userRole">Role</div>
    </div>
  </div>
    <nav class="sidebar-nav">
    <a href="dashboard.html" class="sidebar-link"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg> Overview</a>
    <a href="my-events.html" class="sidebar-link"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg> My Events</a>
    <a href="messages.html" class="sidebar-link"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path></svg> Messages</a>
    <a href="wallet.html" class="sidebar-link"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="5" width="20" height="14" rx="2"/><line x1="2" y1="10" x2="22" y2="10"/></svg> Wallet</a>
    <a href="settings.html" class="sidebar-link active"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-2 2 2 2 0 01-2-2v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83 0 2 2 0 010-2.83l.06-.06a1.65 1.65 0 00.33-1.82 1.65 1.65 0 00-1.51-1H3a2 2 0 01-2-2 2 2 0 012-2h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 010-2.83 2 2 0 012.83 0l.06.06a1.65 1.65 0 001.82.33H9a1.65 1.65 0 001-1.51V3a2 2 0 012-2 2 2 0 012 2v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 0 2 2 0 010 2.83l-.06.06a1.65 1.65 0 00-.33 1.82V9a1.65 1.65 0 001.51 1H21a2 2 0 012 2 2 2 0 01-2 2h-.09a1.65 1.65 0 00-1.51 1z"/></svg> Settings</a>
  </nav>
  <div class="sidebar-footer">
    <button onclick="authLogout()" class="logout-btn"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg> Logout</button>
  </div>
</aside>

<div id="sidebarOverlay" style="position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:90;display:none;opacity:0;transition:opacity 0.3s;"></div>

<main class="dashboard-main">
  <header class="dashboard-header">
    <div>
      <h1 class="dashboard-title">Settings</h1>
      <p style="color:var(--text-secondary);font-size:0.95rem;margin-top:0.2rem;">Manage your profile and preferences.</p>
    </div>
    <button class="mobile-menu-btn" id="openSidebar"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg></button>
  </header>

  <div class="settings-panel">
    <h2 class="settings-title">Personal Information</h2>
    
    <div class="profile-photo-sec">
      <div class="profile-photo" id="profileAvatarLarge">U</div>
      <div>
        <h3 style="font-size:1rem;margin-bottom:0.25rem;">Profile Photo</h3>
        <p style="font-size:0.85rem;color:var(--text-secondary);margin-bottom:1rem;">Recommended size: 256x256px.</p>
        <div class="profile-photo-actions">
          <button onclick="window.location.href='404.html'" type="button" class="btn btn-outline" style="padding:0.5rem 1rem;font-size:0.85rem;">Upload New</button>
          <button onclick="window.location.href='404.html'" type="button" class="btn btn-outline" style="padding:0.5rem 1rem;font-size:0.85rem;border-color:var(--danger);color:var(--danger);">Remove</button>
        </div>
      </div>
    </div>

    <form id="settingsForm">
      <div class="form-row" style="margin-bottom:var(--space-md);">
        <div class="form-group">
          <label class="form-label" for="set-name">Full Name <span style="color:var(--danger)">*</span></label>
          <input type="text" id="set-name" class="form-control" required pattern="[A-Za-z\s]+" title="Please enter letters only" oninvalid="this.setCustomValidity('Please enter your name using letters only.')" oninput="this.setCustomValidity(''); this.value=this.value.replace(/[^A-Za-z\s]/g,'')">
        </div>
        <div class="form-group">
          <label class="form-label" for="set-email">Email Address</label>
          <input type="email" id="set-email" class="form-control" disabled style="background:rgba(255,255,255,0.02);color:var(--text-secondary);cursor:not-allowed;">
        </div>
      </div>
      
      <div class="form-row" style="margin-bottom:var(--space-md);">
        <div class="form-group">
          <label class="form-label" for="set-phone">Phone Number</label>
          <input type="tel" id="set-phone" class="form-control" placeholder="1234567890" pattern="\d{10}" maxlength="10" oninput="this.value=this.value.replace(/[^0-9]/g,'');" title="Please enter exactly 10 digits">
        </div>
        <div class="form-group">
          <label class="form-label" for="set-role">Account Type</label>
          <input type="text" id="set-role" class="form-control" disabled style="background:rgba(255,255,255,0.02);color:var(--text-secondary);cursor:not-allowed;">
        </div>
      </div>
      
      <div style="border-top:1px solid var(--border);padding-top:2rem;margin-top:1rem;display:flex;justify-content:flex-end;">
        <button type="submit" class="btn btn-primary btn-lg">Save Changes</button>
      </div>
    </form>
  </div>
</main>

<div id="toast-container" aria-live="polite"></div>
<script src="js/auth.js"></script>
<script src="js/main.js"></script>
<script>
  let currentUser = authGetUser();
  if (!currentUser) { window.location.href = 'login.html'; }
  else {
    document.getElementById('userName').textContent = currentUser.name;
    document.getElementById('userRole').textContent = currentUser.role || 'Attendee';
    const init = (currentUser.name[0] || 'U').toUpperCase();
    document.getElementById('userAvatar').textContent = init;
    document.getElementById('profileAvatarLarge').textContent = init;
    
    document.getElementById('set-name').value = currentUser.name;
    document.getElementById('set-email').value = currentUser.email;
    document.getElementById('set-role').value = currentUser.role || 'Attendee';
  }
  
  const sidebar = document.getElementById('sidebar');
  const overlay = document.getElementById('sidebarOverlay');
  const openBtn = document.getElementById('openSidebar');
  const closeBtn = document.getElementById('closeSidebar');
  function openSidebar() { sidebar.classList.add('open'); overlay.style.display = 'block'; setTimeout(() => overlay.style.opacity = '1', 10); }
  function closeSidebarFunc() { sidebar.classList.remove('open'); overlay.style.opacity = '0'; setTimeout(() => overlay.style.display = 'none', 300); }
  openBtn.addEventListener('click', openSidebar);
  closeBtn.addEventListener('click', closeSidebarFunc);
  overlay.addEventListener('click', closeSidebarFunc);

  document.getElementById('settingsForm').addEventListener('submit', function(e) {
    e.preventDefault();
    const newName = document.getElementById('set-name').value.trim();
    if (!/^[A-Za-z\s]+$/.test(newName)) { window.showToast('Name must contain only letters.', 'error'); return; }
    
    currentUser.name = newName;
    localStorage.setItem('stackly_events_user', JSON.stringify(currentUser));
    
    document.getElementById('userName').textContent = currentUser.name;
    const init = (currentUser.name[0] || 'U').toUpperCase();
    document.getElementById('userAvatar').textContent = init;
    document.getElementById('profileAvatarLarge').textContent = init;
    
    window.showToast('Profile updated successfully!', 'success');
  });
</script>
</body>
</html>
